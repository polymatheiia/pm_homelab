services:
  db:
    image: mariadb:11.4
    container_name: nextcloud-compose-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --sql-mode=ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PW}
      MYSQL_PASSWORD: ${DB_PW}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${DB_USER}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: nextcloud-compose-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    image: nextcloud:30.0.5
    container_name: nextcloud-compose
    restart: always
    ports:
      - "8000:80"
    depends_on:
      - redis
      - db
    volumes:
      - nextcloud-html:/var/www/html
      - nextcloud-data:/var/www/html/data
    environment:
      MYSQL_PASSWORD: ${DB_PW}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${DB_USER}
      MYSQL_HOST: db
      NEXTCLOUD_TRUSTED_DOMAINS: ${TRUSTED_DOMAINS}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/status.php | grep -q 'installed'"]
      interval: 30s
      timeout: 5s
      retries: 10

volumes:
  nextcloud-html:
  nextcloud-data:
