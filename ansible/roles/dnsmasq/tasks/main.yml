- name: Fail if tailscale_ip is not set
  fail:
    msg: "tailscale_ip must be set in group_vars/all.yml — run: tailscale ip -4"
  when: not tailscale_ip

- name: Install dnsmasq
  pacman:
    name: dnsmasq
    state: present

- name: Deploy dnsmasq config
  template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart dnsmasq

- name: Enable dnsmasq
  systemd:
    name: dnsmasq
    enabled: yes
    state: started
