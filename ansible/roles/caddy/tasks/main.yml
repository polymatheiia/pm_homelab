- name: Install Caddy
  pacman:
    name: caddy
    state: present

- name: Create Caddy config directory
  file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: '0644'
  notify: Restart Caddy

- name: Create Caddy systemd override directory
  file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy Caddy systemd override for Tailscale dependency
  copy:
    content: |
      [Unit]
      After=tailscaled.service
      Wants=tailscaled.service

      [Service]
      Restart=on-failure
      RestartSec=5s
    dest: /etc/systemd/system/caddy.service.d/tailscale.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart Caddy

- name: Enable Caddy
  systemd:
    name: caddy
    enabled: yes
    state: started
