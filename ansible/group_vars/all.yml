homelab_base: /srv/pm_homelab
homelab_user: nymph

# Your Tailscale IPv4 (run: tailscale ip -4). When set, Caddy binds only to this
# interface so services are unreachable from the LAN. Leave empty to listen on all.
tailscale_ip: ""

services:
  - name: immich
    compose_path: "{{ homelab_base }}/services/immich"
    manage_env: true
    port: 2283
  - name: navidrome
    compose_path: "{{ homelab_base }}/services/navidrome"
    manage_env: false
    port: 4533
  - name: vikunja
    compose_path: "{{ homelab_base }}/services/vikunja"
    manage_env: true
    port: 3456
  - name: glance
    compose_path: "{{ homelab_base }}/services/glance"
    manage_env: false
    port: 8080
    security_headers: false
  - name: karakeep
    compose_path: "{{ homelab_base }}/services/karakeep"
    manage_env: true
    port: 3000
  - name: nextcloud
    compose_path: "{{ homelab_base }}/services/nextcloud"
    manage_env: true
    port: 8000
  - name: keycloak
    compose_path: "{{ homelab_base }}/services/keycloak"
    manage_env: true
    port: 8081
  - name: journiv
    compose_path: "{{ homelab_base }}/services/journiv"
    manage_env: true
    port: 8050
  - name: adguard
    compose_path: "{{ homelab_base }}/services/adguard"
    manage_env: false
    port: 3080
    security_headers: false
