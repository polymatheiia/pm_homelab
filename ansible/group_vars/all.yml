homelab_base: /srv/pm_homelab
services:
  - name: immich
    compose_path: "{{ homelab_base }}/services/immich"
    manage_env: true
    port: 2283 
  - name: navidrome
    compose_path: "{{ homelab_base }}/services/navidrome"
    manage_env: false
    port: 4533
  - name: vikunja
    compose_path: "{{ homelab_base }}/services/vikunja"
    manage_env: true
    port: 3456
  - name: glance
    compose_path: "{{ homelab_base }}/services/glance"
    manage_env: false
    port: 8080
  - name: karakeep
    compose_path: "{{ homelab_base }}/services/karakeep"
    manage_env: true
    port: 3000
  - name: nextcloud
    compose_path: "{{ homelab_base }}/services/nextcloud"
    manage_env: true
    port: 8000
  - name: keycloak
    compose_path: "{{ homelab_base }}/services/keycloak"
    manage_env: true
    port: 8081
  - name: journiv
    compose_path: "{{ homelab_base }}/services/journiv"
    manage_env: true
    port: 8050
